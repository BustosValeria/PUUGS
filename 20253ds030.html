<!doctype html>
<html class="no-js" lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jake el Pug | ¡Hora de Aventura!</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Quicksand:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #87CEEB;
      background-image:
        radial-gradient(circle at 20% 30%, white 5%, transparent 10%),
        radial-gradient(circle at 70% 10%, white 8%, transparent 15%),
        radial-gradient(circle at 90% 40%, white 4%, transparent 10%);
      font-family: 'Quicksand', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .adventure-card {
      background-color: #FFCE00;
      max-width: 450px;
      border: 6px solid #000;
      border-radius: 40px;
      padding: 0;
      overflow: hidden;
      box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
      text-align: center;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .image-container {
      background-color: #fff;
      border-bottom: 6px solid #000;
      padding: 10px;
      line-height: 0;
    }

    .image-container img {
      width: 100%;
      height: auto;
      border-radius: 25px;
      border: 4px solid #000;
    }

    .content {
      padding: 30px;
    }

    h1 {
      font-family: 'Bubblegum Sans', cursive;
      font-size: 3rem;
      margin: 0;
      color: #fff;
      text-shadow: 4px 4px 0px #000;
      letter-spacing: 2px;
    }

    .milo-tag {
      display: inline-block;
      background: #000;
      color: #FFCE00;
      padding: 5px 15px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 15px;
      font-weight: bold;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.4;
      color: #4a3728;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.3);
      padding: 15px;
      border-radius: 20px;
      border: 2px dashed #000;
    }

    /* Decoraciones extras */
    .decor {
      font-size: 2rem;
      display: flex;
      justify-content: space-around;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<main class="adventure-card">
  <div class="image-container">
    <img src="https://fcm.mx/wp-content/uploads/2021/06/pug-ruben-flores-2.jpeg" alt="Jake pug volteado">
  </div>

  <div class="content">
    <span class="milo-tag">Perrito de Milo Kiut</span>
    <h1>Jake</h1>

    <p>
      Jake es un pug de dos años, pesa 12 kilos, come muy bien, esta fuertisiiimo, andamos en busqueda de una puga para
      Jake, es perrito de Milo kiut
    </p>

    <div class="decor">
      <span>⚔️</span>
      <span>🦴</span>
      <span>✨</span>
    </div>
  </div>
</main>

</body>

</html>
